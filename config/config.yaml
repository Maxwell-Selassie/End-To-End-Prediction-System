# ============================
# CHURN PREDICTION - CONFIGURATION
# All hardcoded values live here. Nothing is hardcorded in the python scripts
# Change values here, not in code
# =============================

project:
  name: "churn-prediction"
  version: "0.1.0"
  random_seed: 42
  target_column: "churn"


# Paths - All paths relative to project root. Resolved in src/config.py
paths:
  data:
    raw: "data/raw/telco_churn.csv"
    interim: "data/interim/cleaned.parquet"
    processed: "data/processed" # train/test splits saved here

  models: "models/"

  reports:
    figures: "reports/figures/"

  references: "references/"

# Data 
data:
  test_size: 0.2 
  stratify: true
  dataset_size: 7043

# Cleaning
cleaning:
  identifier_columns:
    - "customerID"

  outlier_method: "iqr"
  outlier_multiplier: 3.0 # conservative - only extreme outliers capped
  mcar_diff_threshold: 0.05 # if mean diff > 5%, missingness is not random

# Feature engineering
features:
  tenure_bins: [0, 12, 24, 48, 72]
  tenure_lables: ["new", "developing", "established", "loyal"]
  service_columns:
    - "phoneservice"
    - "multiplelines"
    - "internetservice"
    - "onlinesecurity"
    - "techsupport"
    - "streamingtv"

# Feature selection
feature_selection:
  variance_threshold: 0.01
  mutual_info_threshold: 0.0005

# Preprocessing
preprocessing:
  numeric_imputer: "median" # robust to outliers
  categorical_imputer: "most_frequent"
  scaler : "standard"
  encoder_drop : "first"

# Modelling
modelling:
  cv_folds: 5
  cv_shuffle: true
  scoring: "roc_auc"

  candidates:
    LogisticRegression:
      max_iter: 1000
      random_state: 42
    RandomForest:
      n_estimators: 100
      random_state: 42
      n_jobs: -1
    XGBoost:
      random_state: 42
      eval_metric: "logloss"
      verbosity: 0

  tuning:
    n_iter: 40
    random_state: 42
    n_jobs: -1
    params-grid:
      clf__n_estimators: [100, 200, 300, 400]
      clf__max_depth: [3, 4, 5, 6]
      clf__learning_rate: [0.01, 0.05, 0.1, 0.2]
      clf__subsample: [0.7, 0.8, 0.9, 1.0]
      clf__colsample_bytree: [0.6, 0.7, 0.8, 1.0]
      clf__min_child_weight: [1, 3, 5]
      clf__gamma: [0, 0.1, 0.2]
      clf__reg_alpha: [0, 0.01, 0.1]

# Evaluation
evaluation:
  classification_threshold: 0.5
  threshold_range: [0.1, 0.9, 0.05]
  shap_sample_size: 500
  top_n_features: 15

# Plotting
plotting:
  style: "dark"
  dpi: 300
  figsize:
    small: [10, 5]    
    medium: [14, 7]
    large: [18, 10]
  colors:
    accent: "#00D4FF"
    danger: "#FF4B6E"
    success: "#00C897"
    warning: "#FFB347"
    muted: "#8892A4"
    bg_dark: "#0F1117"
    bg_mid: "#1A1D27"